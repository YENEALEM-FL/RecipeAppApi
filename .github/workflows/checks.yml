name: Checks

on: [push]

jobs:
  test-lint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker compose build

      - name: Test
        run: docker compose run --rm app python manage.py test

      - name: Lint
        run: docker compose run --rm app flake8

      - name: Install mailutils
        run: |
          sudo apt-get update
          sudo apt-get install -y mailutils

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use printf to safely handle special characters
          SAFE_MSG=$(printf "🚀 New push by %s\nCommit: %s" "${{ github.actor }}" "$COMMIT_MSG")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${SAFE_MSG}"
